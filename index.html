<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chá de Casa Nova — Marcondes & Letícia</title>
  <meta property="og:title" content="Chá de Casa Nova — Marcondes & Letícia">
  <meta property="og:description" content="Escolha um presente e deixe sua mensagem para o casal!">
  <meta property="og:image" content="/img/casal.jpg">
  <meta property="og:type" content="website">
  <meta name="theme-color" content="#d4a574">
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="preload" href="data/presentes.json" as="fetch" crossorigin>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Hero / Página Inicial -->
  <header id="hero">
    <div class="hero-content">
      <img src="img/casal.jpg" alt="Marcondes e Letícia" class="hero-photo">
      <h1>Marcondes & Letícia</h1>
      <p class="hero-subtitle">Chá de Casa Nova</p>
      <a href="#presentes" class="btn-presentes">Ver Lista de Presentes</a>
    </div>
  </header>

  <!-- Lista de Presentes -->
  <main id="presentes">
    <h2>Lista de Presentes</h2>
    <div id="grid-presentes" class="grid-presentes">
      <!-- Cards renderizados via JS -->
    </div>
  </main>

  <!-- Modal -->
  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <button class="modal-close" aria-label="Fechar">&times;</button>
      <div id="modal-body">
        <!-- Conteúdo dinâmico -->
      </div>
    </div>
  </div>

  <footer>
    <p>Feito com amor para Marcondes & Letícia</p>
  </footer>

  <!-- QR Code library -->
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js" integrity="sha384-3zSEDfvllQohrq0PHL1fOXJuC/jSOO34H46t6UQfobFOmxE5BpjjaIJY5F2/bMnU" crossorigin="anonymous" defer></script>

  <!-- App scripts -->
  <script src="js/pix.js"></script>
  <script src="js/sheets.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
